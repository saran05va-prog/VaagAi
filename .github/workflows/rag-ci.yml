# GitHub Actions CI/CD for RAG Service
name: RAG Service CI

on:
  push:
    branches: [main, master]
    paths:
      - 'rag/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'rag/**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('rag/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        working-directory: rag
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        working-directory: rag
        run: |
          pip install flake8
          flake8 rag agent eval --max-line-length=120 --ignore=E501,W503 || true

      - name: Run pytest
        working-directory: rag
        env:
          GROQ_API_KEY: test-key
          CHROMA_PERSIST_DIRECTORY: /tmp/test_chroma
          DOCUMENTS_DIRECTORY: /tmp/test_docs
        run: |
          pytest tests/ -v --tb=short || true

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        working-directory: rag
        run: |
          docker build -t vaagai-rag:${{ github.sha }} .

      - name: Test container runs
        run: |
          docker run -d --name test-rag -p 8001:8001 -e GROQ_API_KEY=test vaagai-rag:${{ github.sha }}
          sleep 10
          docker logs test-rag
          docker stop test-rag || true