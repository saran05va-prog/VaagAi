<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7bf1a8"/>
      <stop offset="0.5" stop-color="#2e7d32"/>
      <stop offset="1" stop-color="#11361a"/>
    </linearGradient>
    <linearGradient id="leaf" x1="20" y1="48" x2="48" y2="16" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#d6f5dd"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="16" fill="url(#bg)"/>

  <!-- Sprout stem -->
  <path d="M32 50 L32 30" stroke="url(#leaf)" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Left leaf -->
  <path d="M32 34 C24 34 18 28 18 20 C26 20 32 26 32 34 Z" fill="url(#leaf)"/>

  <!-- Right leaf -->
  <path d="M32 30 C40 30 46 24 46 16 C38 16 32 22 32 30 Z" fill="url(#leaf)"/>

  <!-- AI spark dots -->
  <circle cx="32" cy="14" r="3" fill="#aaffcc"/>
  <circle cx="32" cy="14" r="1.5" fill="#ffffff"/>
  <circle cx="46" cy="10" r="1.8" fill="#aaffcc" opacity="0.7"/>
  <circle cx="18" cy="12" r="1.5" fill="#aaffcc" opacity="0.6"/>

  <!-- Ground line -->
  <path d="M20 52 Q32 54 44 52" stroke="#1a4d1a" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
</svg>
